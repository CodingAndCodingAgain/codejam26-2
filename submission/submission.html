<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Joel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style type="text/css">
      html,
      body {
        background: transparent;
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }

      #overlay-container {
        width: 960px;
        height: 540px;
      }

      /* Bad buttons */
      #powered-by {
        position: absolute;
        top: 20px;
        right: 0;
        padding: 10px 18px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid black;
        border-right-width: 0;
        font-size: 1.2rem;
        border-radius: 4px 0 0 4px;
        color: white;

        font-size: 12px;
      }

      #powered-by-desc {
        font-size: 10px;
      }

      /* Bad buttons */
      .bad-buttons {
        display: none; /* Hidden until ad starts */
        position: absolute;
        bottom: 60px;
        right: 0;
        padding: 10px 18px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid black;
        border-right-width: 0;
        font-size: 1.2rem;
        border-radius: 4px 0 0 4px;
        color: white;
        cursor: pointer;
      }

      /* Popup ninja */
      #hover-ninja-popup {
        background: white;
        color: #333;
        border-radius: 8px;
        text-align: center;
        min-width: 280px;
        display: none;

        height: 50%;
        width: 50%;
        position: absolute;
        top: 25%;
        left: 25%;

        padding: 10px;
        align-items: center;
        flex-direction: column;
      }

      #hover-ninja-header {
        h2 {
          font-weight: 400;
        }
      }

      #hover-ninja-desc {
        font-weight: 100;
        margin-bottom: 30px;
      }

      #hover-ninja-input {
        position: relative;
        box-sizing: border-box;
        height: 100%;
        width: 100%;
      }

      #hover-ninja-submit {
        margin-top: 5px;
        border-radius: 8px;
        padding: 4px;
      }

      .fade-in {
        opacity: 1;
        animation-name: fadeInOpacity;
        animation-iteration-count: 1;
        animation-timing-function: ease-in;
        animation-duration: 0.6s;
      }

      @keyframes fadeInOpacity {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div id="overlay-container">
      <div id="powered-by">
        <div>
          <span>Powered by:</span>
          <span id="powered-by-label"></span>
        </div>
        <div>
          <span id="powered-by-desc"></span>
        </div>
      </div>

      <!-- The on hover ninja -->
      <button id="hover-ninja-button" class="bad-buttons">Skip Ad...</button>
      <div id="hover-ninja-popup" class="fade-in">
        <div id="hover-ninja-header">
          <h2>Hey, just wait a moment!</h2>
        </div>
        <div id="hover-ninja-desc">
          Help us understand why you wanted to skip the ad to help our
          advertisers. Answer this quick question to proceed!
        </div>
        <textarea
          id="hover-ninja-input"
          placeholder="What did you like about the ad? If you liked it, type 'Yes, I loved it'"
        ></textarea>
        <button id="hover-ninja-submit">Submit</button>
      </div>
    </div>

    <script type="text/javascript">
      (function (window, document) {
        const adFail = () => window.top.postMessage({ type: "fail" }, "*");
        const getVideoInfo = () =>
          window.top.postMessage({ type: "getVideoInfo" }, "*");
        const pauseVideo = () => window.top.postMessage({ type: "pause" }, "*");
        const resumeVideo = () => window.top.postMessage({ type: "play" }, "*");

        const isMobile =
          /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
            navigator.userAgent,
          );

        window.removeEventListener("message", null);

        // On hover ninja: The ninja popup
        // Just before the user can click the button, our ninja will appear and prompt something silly.
        // However, there are connectivity problems sending the important message the user typed in and the process must be restarted again!

        const hoverNinjaButton = document.getElementById("hover-ninja-button");
        const hoverNinjaPopup = document.getElementById("hover-ninja-popup");
        const hoverNinjaInput = document.getElementById("hover-ninja-input");
        const hoverNinjaSubmit = document.getElementById("hover-ninja-submit");

        let theyLikedAtLeastOnce = false;

        // Change the button behaviour
        isMobile
          ? hoverNinjaButton.onclick
          : (hoverNinjaButton.onmouseenter = () => {
              hoverNinjaButton.style.display = "none";
              hoverNinjaPopup.style.display = "flex";
              pauseVideo();
            });

        // If they submitted an answer that is not "Yes, I loved it", restart.
        // If they submitted "Yes, I loved it", give them a pat on the back, then restart when they try again.
        hoverNinjaSubmit.onclick = () => {
          const didTheyLovedIt = hoverNinjaInput.value === "Yes, I loved it";
          const confirmText =
            didTheyLovedIt && !theyLikedAtLeastOnce
              ? "That is so good to hear!"
              : "Sorry, we could't submit the answer you provided due to a network failure, restarting...";

          alert(confirmText);

          if (!didTheyLovedIt) {
            adFail();
          } else {
            if (theyLikedAtLeastOnce) {
              adFail();
            } else {
              theyLikedAtLeastOnce = true;
              hoverNinjaPopup.style.display = "none";
              hoverNinjaButton.style.display = "block";
              resumeVideo();
            }
          }
        };

        window.addEventListener("message", (event) => {
          if (event.data.type === "adStarted") {
            hoverNinjaButton.style.display = "block";
          }

          if (event.data.type === "adFinished") {
            [hoverNinjaButton, hoverNinjaPopup].map(
              (e) => (e.style.display = "none"),
            );
            adFail();
          }
        });
      })(window, document);
    </script>

  </body>
</html>
